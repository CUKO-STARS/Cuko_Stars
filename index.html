<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKS Cosmic Empire</title>
    <style>
        :root { --bg: #050811; --accent: #38bdf8; --gold: #fbbf24; --crimson: #e11d48; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Stats */
        .panel { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .val { font-size: 18px; font-weight: bold; color: var(--accent); }
        .label { font-size: 10px; color: #64748b; }

        /* Rocket (Crash Game) */
        .rocket-box { background: linear-gradient(180deg, #1e1b4b 0%, #050811 100%); border: 2px solid #312e81; overflow: hidden; position: relative; height: 180px; }
        #rocket-multiplier { font-size: 40px; font-weight: 900; margin-top: 40px; transition: 0.1s; }
        .rocket-status { font-size: 12px; color: #94a3b8; }
        .crash-input { background: #0f172a; border: 1px solid var(--accent); color: white; padding: 8px; border-radius: 5px; width: 80%; margin: 10px 0; }

        /* General UI */
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-blue { background: var(--accent); color: #000; }
        .btn-red { background: var(--crimson); color: white; }
        .btn-gold { background: var(--gold); color: #000; }
        
        #tap-target { width: 120px; height: 120px; margin: 10px auto; background: url('https://cdn-icons-png.flaticon.com/512/1041/1041888.png') center/contain no-repeat; cursor: pointer; }
        #tap-target:active { transform: scale(0.9); }

        .transfer-box { font-size: 11px; color: #94a3b8; }
        #export-key { font-family: monospace; background: #000; padding: 5px; display: block; margin: 5px 0; color: #10b981; word-break: break-all; }
        
        /* Overlay */
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="overlay">
    <div id="case-result" style="font-size: 24px; text-align: center;"></div>
    <button class="btn btn-blue" style="width: 200px; margin-top: 20px;" onclick="closeOverlay()">OK</button>
</div>

<div class="app">
    <div class="panel">
        <div class="stats-grid">
            <div><div class="label">STARS</div><div class="val" id="stars">0</div></div>
            <div><div class="label">CWK</div><div class="val" id="cwk">0</div></div>
            <div><div class="label">PRIME</div><div class="val" id="prime">0</div></div>
        </div>
        <div id="rank" style="font-weight: bold; color: var(--gold);">НОВИЧОК</div>
    </div>

    <div class="panel rocket-box" id="rocket-screen">
        <div class="rocket-status" id="rocket-info">РАКЕТА ГОТОВА</div>
        <div id="rocket-multiplier">1.00x</div>
        <input type="number" id="bet-amount" class="crash-input" placeholder="Ставка STARS">
        <button id="rocket-btn" class="btn btn-blue" onclick="startRocket()">ВЗЛЕТ</button>
    </div>

    <div id="tap-target"></div>
    <div style="text-align:center; font-size:12px; color:var(--accent)">TAP TO EARN +0.2</div>

    <div class="panel">
        <div class="label" style="margin-bottom:10px">ОБМЕН: 275,500 ⭐ = 1 CWK | 3 CWK = 1 PRIME</div>
        <div style="display:flex; gap:5px">
            <button class="btn btn-blue" onclick="buyCWK()">STARS -> CWK</button>
            <button class="btn btn-gold" onclick="buyPrime()">3 CWK -> PRIME</button>
        </div>
    </div>

    <div class="panel transfer-box">
        <strong>ПЕРЕДАЧА АККАУНТА</strong>
        <span id="export-key">ЗАГРУЗКА...</span>
        <input type="text" id="import-key" class="crash-input" style="width:90%" placeholder="Вставьте код другого аккаунта">
        <button class="btn" style="background:#444; color:white; padding:5px" onclick="importAccount()">ЗАГРУЗИТЬ АККАУНТ</button>
    </div>
</div>

<script>
    let data = { stars: 25, cwk: 0, prime: 0, rank: "НОВИЧОК" };
    let isFlying = false;
    let rocketInterval;

    function updateUI() {
        document.getElementById('stars').innerText = Math.floor(data.stars).toLocaleString();
        document.getElementById('cwk').innerText = data.cwk;
        document.getElementById('prime').innerText = data.prime;
        
        if(data.prime >= 3) {
            data.rank = "MASTER";
            document.getElementById('rank').style.color = "#ff00ff";
        }
        document.getElementById('rank').innerText = data.rank;
        
        // Export Key generation (Simple Base64)
        const key = btoa(JSON.stringify(data));
        document.getElementById('export-key').innerText = key;
        
        localStorage.setItem('cks_save_v3', JSON.stringify(data));
    }

    // Tap Earn
    document.getElementById('tap-target').onclick = () => {
        data.stars += 0.2;
        updateUI();
    };

    // Rocket (Crash) Game
    function startRocket() {
        const bet = parseFloat(document.getElementById('bet-amount').value);
        if (isNaN(bet) || bet <= 0 || bet > data.stars) {
            alert("Недостаточно STARS или неверная ставка!");
            return;
        }

        if (isFlying) return;

        data.stars -= bet;
        isFlying = true;
        let currentMult = 1.00;
        const crashAt = (Math.random() * 4).toFixed(2); // Max 4x ish, but can crash early
        
        document.getElementById('rocket-btn').innerText = "ЗАБРАТЬ";
        document.getElementById('rocket-btn').onclick = () => cashOut(bet, currentMult);
        document.getElementById('rocket-info').innerText = "ПОЛЕТ...";
        document.getElementById('rocket-multiplier').style.color = "white";

        rocketInterval = setInterval(() => {
            currentMult += 0.01;
            document.getElementById('rocket-multiplier').innerText = currentMult.toFixed(2) + "x";

            if (currentMult >= crashAt) {
                clearInterval(rocketInterval);
                document.getElementById('rocket-multiplier').innerText = "CRASHED!";
                document.getElementById('rocket-multiplier').style.color = "var(--crimson)";
                resetRocket();
            }
        }, 50);
    }

    function cashOut(bet, mult) {
        if (!isFlying) return;
        clearInterval(rocketInterval);
        const win = bet * mult;
        data.stars += win;
        alert("Вы выиграли: " + Math.floor(win) + " STARS!");
        resetRocket();
        updateUI();
    }

    function resetRocket() {
        isFlying = false;
        document.getElementById('rocket-btn').innerText = "ВЗЛЕТ";
        document.getElementById('rocket-btn').onclick = startRocket;
        document.getElementById('rocket-info').innerText = "РАКЕТА ГОТОВА";
        setTimeout(() => {
            if(!isFlying) document.getElementById('rocket-multiplier').innerText = "1.00x";
        }, 2000);
    }

    // Economy
    function buyCWK() {
        if(data.stars >= 275500) { data.stars -= 275500; data.cwk += 1; updateUI(); }
    }

    function buyPrime() {
        if(data.cwk >= 3) { data.cwk -= 3; data.prime += 1; updateUI(); }
        else { alert("Нужно 3 CWK для 1 PRIME!"); }
    }

    // Account Transfer
    function importAccount() {
        try {
            const key = document.getElementById('import-key').value;
            const decoded = JSON.parse(atob(key));
            if(decoded.stars !== undefined) {
                data = decoded;
                updateUI();
                alert("Аккаунт успешно перенесен!");
            }
        } catch(e) {
            alert("Неверный код аккаунта!");
        }
    }

    // Init
    const saved = localStorage.getItem('cks_save_v3');
    if(saved) data = JSON.parse(saved);
    updateUI();
</script>
</body>
</html>
