<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKS Cosmic Clicker</title>
    <style>
        :root {
            --tg-theme-bg: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Stats Card */
        .stats-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .stat-val { font-size: 18px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }

        .rank-tag {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin: 10px auto;
            width: fit-content;
            font-weight: bold;
        }

        /* Tap Section */
        .tap-area {
            position: relative;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tap-target {
            width: 180px;
            height: 180px;
            background: url('https://cdn-icons-png.flaticon.com/512/3064/3064793.png') center/contain no-repeat;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4));
        }

        #tap-target:active { transform: scale(0.92); }

        /* Floating Animation */
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .floating-text {
            position: absolute;
            color: var(--accent);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        /* Case Animation Styles */
        .box-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .box-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .box-card:hover { background: rgba(255,255,255,0.1); }

        .box-img { width: 60px; height: 60px; margin-bottom: 10px; }

        button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        button:active { opacity: 0.8; }

        /* Overlay for Case Opening */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .case-anim {
            width: 150px;
            height: 150px;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        .reward-reveal {
            font-size: 24px;
            color: var(--gold);
            margin-top: 20px;
            text-shadow: 0 0 10px var(--gold);
            display: none;
        }
    </style>
</head>
<body>

<div id="overlay">
    <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png" class="case-anim" id="case-img">
    <div class="reward-reveal" id="reward-text">ВЫ ВЫИГРАЛИ CKS!</div>
</div>

<div class="app">
    <div class="stats-panel">
        <div>
            <div class="stat-label">Stars</div>
            <div class="stat-val" id="stars">25</div>
        </div>
        <div>
            <div class="stat-label">CWK</div>
            <div class="stat-val" id="cwk">0</div>
        </div>
        <div>
            <div class="stat-label">Prime</div>
            <div class="stat-val" id="prime">0</div>
        </div>
    </div>

    <div class="rank-tag" id="rank">НОВИЧОК</div>

    <div class="tap-area" id="tap-area">
        <div id="tap-target"></div>
    </div>

    <div class="box-container">
        <div class="box-card">
            <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png" class="box-img">
            <div>10 Stars</div>
            <button onclick="attemptOpen(10)">ОТКРЫТЬ</button>
        </div>
        <div class="box-card">
            <img src="https://cdn-icons-png.flaticon.com/512/679/679713.png" class="box-img">
            <div>25 Stars</div>
            <button onclick="attemptOpen(25)">ОТКРЫТЬ</button>
        </div>
        <div class="box-card">
            <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png" class="box-img" style="filter: hue-rotate(90deg);">
            <div>60 Stars</div>
            <button onclick="attemptOpen(60)">ОТКРЫТЬ</button>
        </div>
        <div class="box-card">
            <img src="https://cdn-icons-png.flaticon.com/512/679/679713.png" class="box-img" style="filter: hue-rotate(250deg);">
            <div>150 Stars</div>
            <button onclick="attemptOpen(150)">ОТКРЫТЬ</button>
        </div>
    </div>

    <div class="stats-panel" style="display: block; font-size: 12px;">
        <p>Курс: 275,500 Stars = 1 CWK</p>
        <button onclick="exchangeCWK()" style="margin-bottom: 10px;">ОБМЕНЯТЬ STARS</button>
        <button onclick="exchangePrime()" style="background: #a855f7; color: white;">1 CWK -> 1 PRIME</button>
    </div>
</div>

<script>
    let data = {
        stars: 25,
        cwk: 0,
        prime: 0,
        rank: "НОВИЧОК"
    };

    const cksCollection = [
        { name: "Обычный CKS", bonus: 5 },
        { name: "Редкий CKS", bonus: 20 },
        { name: "Эпический CKS", bonus: 100 },
        { name: "Легендарный CKS", bonus: 500 }
    ];

    function updateDisplay() {
        document.getElementById('stars').innerText = data.stars.toLocaleString(undefined, {minimumFractionDigits: 1});
        document.getElementById('cwk').innerText = data.cwk;
        document.getElementById('prime').innerText = data.prime;
        
        if(data.prime >= 3) {
            data.rank = "MASTER";
            document.getElementById('rank').style.background = "linear-gradient(90deg, #f59e0b, #ef4444)";
        }
        document.getElementById('rank').innerText = data.rank;
        localStorage.setItem('bearGameSaveV2', JSON.stringify(data));
    }

    // Tap System
    document.getElementById('tap-target').addEventListener('click', (e) => {
        data.stars += 0.2;
        
        // Create floating text
        const floating = document.createElement('div');
        floating.className = 'floating-text';
        floating.innerText = '+0.2';
        floating.style.left = e.clientX + 'px';
        floating.style.top = e.clientY + 'px';
        document.body.appendChild(floating);
        setTimeout(() => floating.remove(), 800);
        
        updateDisplay();
    });

    // Animated Case Opening
    function attemptOpen(cost) {
        if (data.stars >= cost) {
            data.stars -= cost;
            showAnimation();
        } else {
            alert("Недостаточно Stars!");
        }
    }

    function showAnimation() {
        const overlay = document.getElementById('overlay');
        const rewardText = document.getElementById('reward-text');
        const caseImg = document.getElementById('case-img');
        
        overlay.style.display = 'flex';
        rewardText.style.display = 'none';
        caseImg.style.animation = 'shake 0.2s infinite';

        setTimeout(() => {
            caseImg.style.animation = 'none';
            caseImg.style.transform = 'scale(1.5)';
            
            const roll = Math.random();
            let won;
            if(roll > 0.9) won = cksCollection[3];
            else if(roll > 0.7) won = cksCollection[2];
            else if(roll > 0.4) won = cksCollection[1];
            else won = cksCollection[0];

            data.stars += won.bonus;
            rewardText.innerText = "ВЫПАЛ: " + won.name + "\n+" + won.bonus + " ⭐";
            rewardText.style.display = 'block';

            setTimeout(() => {
                overlay.style.display = 'none';
                caseImg.style.transform = 'scale(1)';
                updateDisplay();
            }, 2000);
        }, 1500);
    }

    function exchangeCWK() {
        if(data.stars >= 275500) {
            data.stars -= 275500;
            data.cwk += 1;
            updateDisplay();
        }
    }

    function exchangePrime() {
        if(data.cwk >= 1) {
            data.cwk -= 1;
            data.prime += 1;
            updateDisplay();
        }
    }

    // Load Data
    const saved = localStorage.getItem('bearGameSaveV2');
    if(saved) {
        data = JSON.parse(saved);
        updateDisplay();
    }
</script>

</body>
</html>
