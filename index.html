<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Collector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation; /* Zoomni bloklaydi */
        }
        .header { background: rgba(0,0,0,0.5); padding: 15px; border-bottom: 2px solid #ffd700; }
        .stats { font-size: 20px; color: #ffd700; margin: 10px 0; }
        .main-tap-area {
            width: 200px; height: 200px;
            background: url('https://cdn-icons-png.flaticon.com/512/1828/1828884.png') no-repeat center;
            background-size: contain;
            margin: 30px auto;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .main-tap-area:active { transform: scale(0.9); }
        .boxes { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; }
        .box {
            background: #0f3460; border: 2px solid #e94560; border-radius: 10px;
            padding: 15px; width: 120px; cursor: pointer;
        }
        .box:hover { background: #16213e; }
        .btn {
            background: #e94560; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; margin: 5px;
        }
        .btn:disabled { background: #555; }
        .ultra { color: #00ff00; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body onclick="">

<div class="header">
    <h1>Star Collector</h1>
    <div id="ultra-title" class="ultra" style="display:none;">ТИТУЛ: ULTRA</div>
</div>

<div class="stats">
    ⭐ Звёзды: <span id="stars">25</span><br>
    💎 CWS: <span id="cws">0</span> / 5
</div>

<div class="main-tap-area" onclick="tap()"></div>
<p>Нажми, чтобы получить 0.2⭐</p>

<hr>

<h3>Магазин Ящиков</h3>
<div class="boxes">
    <div class="box" onclick="buyBox(80)">📦 80⭐<br><small>Малый</small></div>
    <div class="box" onclick="buyBox(130)">📦 130⭐<br><small>Средний</small></div>
    <div class="box" onclick="buyBox(300)">🎁 300⭐<br><small>Большой</small></div>
</div>

<hr>

<h3>Обмен</h3>
<button class="btn" onclick="exchangeCWS()">Обменять 275,500⭐ на 1 CWS</button>
<br>
<button class="btn" onclick="resetGame()" style="background:#555;">Сбросить прогресс</button>

<script>
    // O'zgaruvchilar
    let stars = 25.0;
    let cws = 0;
    let hasUltra = false;

    // Load (Yuklash)
    if (localStorage.getItem('starSave')) {
        let data = JSON.parse(localStorage.getItem('starSave'));
        stars = data.stars;
        cws = data.cws;
        hasUltra = data.hasUltra;
        updateUI();
    }

    function updateUI() {
        document.getElementById('stars').innerText = stars.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
        document.getElementById('cws').innerText = cws;
        if (cws >= 5) {
            hasUltra = true;
            document.getElementById('ultra-title').style.display = 'block';
        }
        saveGame();
    }

    function tap() {
        stars += 0.2;
        updateUI();
    }

    function buyBox(cost) {
        if (stars >= cost) {
            stars -= cost;
            // Boxdan tasodifiy mukofot (masalan 1.5 baravar ko'p yulduz chiqishi mumkin)
            let win = Math.random() * (cost * 1.5);
            stars += win;
            alert("Вы открыли ящик и получили " + win.toFixed(1) + "⭐");
            updateUI();
        } else {
            alert("Недостаточно звёзд!");
        }
    }

    function exchangeCWS() {
        if (stars >= 275500) {
            stars -= 275500;
            cws += 1;
            alert("Поздравляем! Вы получили 1 CWS");
            updateUI();
        } else {
            alert("Вам нужно 275,500 звёзд!");
        }
    }

    function saveGame() {
        let data = { stars: stars, cws: cws, hasUltra: hasUltra };
        localStorage.setItem('starSave', JSON.stringify(data));
    }

    function resetGame() {
        if(confirm("Вы уверены, что хотите обнулить игру?")) {
            stars = 25;
            cws = 0;
            hasUltra = false;
            document.getElementById('ultra-title').style.display = 'none';
            updateUI();
        }
    }

    // Mobil qurilmalarda "yaqinlashish"ni butunlay yo'qotish
    document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
            event.preventDefault();
        }
    }, { passive: false });

</script>

</body>
</html>
