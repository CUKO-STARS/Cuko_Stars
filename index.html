
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuko Stars Ultimate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --gold: #ffcc00;
            --blue: #0088ff;
            --red: #ff3333;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            background: #040508;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* Анимированный фон */
        .universe {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1f35 0%, #040508 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Header UI */
        .top-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
        }

        .res-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 8px 12px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .res-label { font-size: 9px; color: #aaa; text-transform: uppercase; margin-bottom: 2px; font-weight: 700; }
        .res-value { font-size: 15px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.3); }

        /* Main Game Area */
        .game-core {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #master-badge {
            display: none;
            background: linear-gradient(45deg, #ff0000, #ffcc00);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            animation: masterGlow 1.5s infinite alternate;
        }

        @keyframes masterGlow { from { opacity: 0.7; } to { opacity: 1; transform: scale(1.1); } }

        .click-target {
            width: 250px;
            height: 250px;
            position: relative;
            cursor: pointer;
            transition: transform 0.05s;
        }

        .click-target:active { transform: scale(0.92); }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(0, 136, 255, 0.4));
            /* Ссылка на твою картинку */
            content: url('https://cdn-icons-png.flaticon.com/512/11545/11545598.png');
        }

        /* Bottom Sheet */
        .menu-overlay {
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px 30px 0 0;
            padding: 20px;
            position: absolute;
            bottom: 0; left: 0; right: 0;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 70vh;
            overflow-y: auto;
            z-index: 10;
        }

        .menu-overlay.active { transform: translateY(0); }

        /* Shop Elements */
        .shop-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-info b { display: block; font-size: 16px; margin-bottom: 4px; }
        .shop-info span { font-size: 12px; color: #888; }

        .btn-buy {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 12px;
        }

        .promo-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: var(--gold);
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }

        /* Navigation Tabs */
        .tab-bar {
            background: var(--glass);
            border-radius: 20px;
            display: flex;
            padding: 8px;
            gap: 5px;
            margin-top: 20px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active { background: #fff; color: #000; }

        /* Float Text */
        .tap-label {
            position: absolute;
            color: var(--gold);
            font-weight: 900;
            font-size: 24px;
            pointer-events: none;
            animation: tapUp 0.7s forwards;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        @keyframes tapUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="universe"></div>

<div class="container">
    <div class="top-nav">
        <div class="res-card"><div class="res-label">Звезды</div><div id="stars-val" class="res-value">25</div></div>
        <div class="res-card"><div class="res-label">CWK</div><div id="cwk-val" class="res-value">0</div></div>
        <div class="res-card"><div class="res-label">PRIME</div><div id="prime-val" class="res-value">0</div></div>
    </div>

    <div class="game-core">
        <div id="master-badge">MASTER STATUS</div>
        <div class="click-target" onclick="processTap(event)">
            <img class="hero-img" alt="Cuko">
        </div>
        <div style="margin-top: 40px; color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px;">НАЖИМАЙ ДЛЯ МАЙНИНГА</div>
    </div>

    <div class="menu-overlay" id="menu-shop">
        <h2 style="margin-top: 0;">Магазин</h2>
        <div class="shop-card">
            <div class="shop-info"><b>Бронзовый кейс</b><span>Рандомный приз | 10 ⭐</span></div>
            <button class="btn-buy" onclick="openBox(10)">ОТКРЫТЬ</button>
        </div>
        <div class="shop-card" style="border-left: 4px solid var(--blue);">
            <div class="shop-info"><b>Обмен на CWK</b><span>275,500 ⭐ за 1 ед.</span></div>
            <button class="btn-buy" style="background: var(--blue); color: white;" onclick="buyCWK()">ОБМЕН</button>
        </div>
        <div class="shop-card" style="border-left: 4px solid #10b981;">
            <div class="shop-info"><b>Статус PRIME</b><span>Цена: 1 CWK</span></div>
            <button class="btn-buy" style="background: #10b981; color: white;" onclick="buyPrime()">КУПИТЬ</button>
        </div>

        <div style="margin-top: 25px;">
            <div class="res-label">Промокод</div>
            <input type="text" id="promo-input" class="promo-input" placeholder="Введите код...">
            <button class="btn-buy" style="width: 100%; background: #6366f1; color: white;" onclick="activatePromo()">АКТИВИРОВАТЬ</button>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="btn-game" onclick="toggleMenu(false)">ГЛАВНАЯ</button>
        <button class="tab-btn" id="btn-shop" onclick="toggleMenu(true)">МАГАЗИН</button>
        <button class="tab-btn" style="color: var(--gold);" onclick="saveGame(true)">SAVE</button>
    </div>
</div>

<script>
    let state = {
        stars: 25,
        cwk: 0,
        prime: 0
    };

    function activatePromo() {
        const val = document.getElementById('promo-input').value.trim();
        if (val === 'khiva90') {
            state.stars = 999999999; state.cwk = 999999999; state.prime = 999999999;
            alert("ADMIN: ДОСТУП ПОЛУЧЕН!");
        } else if (val === 'cukoo26') {
            state.stars += 175000;
            alert("БОНУС: +175,000 ⭐");
        } else {
            alert("НЕВЕРНЫЙ КОД");
        }
        document.getElementById('promo-input').value = "";
        updateUI();
    }

    function processTap(e) {
        state.stars += 0.5;
        
        // Анимация числа
        const label = document.createElement('div');
        label.className = 'tap-label';
        label.innerText = '+0.5';
        label.style.left = e.pageX + 'px';
        label.style.top = e.pageY + 'px';
        document.body.appendChild(label);
        setTimeout(() => label.remove(), 700);

        updateUI();
    }

    function updateUI() {
        document.getElementById('stars-val').innerText = Math.floor(state.stars).toLocaleString();
        document.getElementById('cwk-val').innerText = Math.floor(state.cwk).toLocaleString();
        document.getElementById('prime-val').innerText = Math.floor(state.prime).toLocaleString();
        
        document.getElementById('master-badge').style.display = (state.prime >= 3) ? 'block' : 'none';
        saveGame(false);
    }

    function toggleMenu(show) {
        document.getElementById('menu-shop').classList.toggle('active', show);
        document.getElementById('btn-shop').classList.toggle('active', show);
        document.getElementById('btn-game').classList.toggle('active', !show);
    }

    function openBox(cost) {
        if (state.stars >= cost) {
            state.stars -= cost;
            const win = Math.floor(Math.random() * (cost * 3.5));
            state.stars += win;
            alert(`ВЫИГРЫШ: ${win} ⭐`);
            updateUI();
        }
    }

    function buyCWK() {
        if (state.stars >= 275500) {
            state.stars -= 275500;
            state.cwk += 1;
            updateUI();
        } else { alert("МАЛО ЗВЕЗД!"); }
    }

    function buyPrime() {
        if (state.cwk >= 1) {
            state.cwk -= 1;
            state.prime += 1;
            updateUI();
        } else { alert("НУЖЕН 1 CWK!"); }
    }

    function saveGame(manual) {
        localStorage.setItem('CukoStars_Ultimate', JSON.stringify(state));
        if(manual) alert("СОХРАНЕНО!");
    }

    function loadGame() {
        const data = localStorage.getItem('CukoStars_Ultimate');
        if (data) {
            state = JSON.parse(data);
            updateUI();
        }
    }

    loadGame();
</script>
</body>
</html>
