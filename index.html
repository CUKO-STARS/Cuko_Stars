<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuko Stars - Lobby</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');

        :root {
            --bs-yellow: #ffcb05;
            --bs-blue: #0072ce;
            --bs-green: #4cd964;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Lilita One', cursive;
            background: #000;
        }

        /* Landscape Mode Force */
        .game-wrapper {
            width: 100vw;
            height: 100vh;
            background: url('https://wallpaperaccess.com/full/1393333.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            display: flex;
            justify-content: space-between;
            padding: 10px 30px;
            background: rgba(0,0,0,0.4);
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.6);
            padding: 5px 20px;
            border-radius: 30px;
            border: 2px solid #fff;
        }

        .resource-box {
            display: flex;
            gap: 15px;
        }

        .res-item {
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            padding: 5px 15px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Lobby Character Area */
        .lobby-main {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 50px;
        }

        .character-box {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .character-img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            /* Siz bergan rasm havolasi */
            content: url('https://lh3.googleusercontent.com/d/1aEbupyaq69yrdGOOd');
            animation: idleFloat 3s ease-in-out infinite;
        }

        @keyframes idleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        /* Right Side Buttons */
        .side-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: absolute;
            right: 20px;
            top: 100px;
        }

        .menu-btn {
            width: 100px;
            height: 45px;
            background: #ff7f00;
            border: 3px solid #fff;
            border-radius: 10px;
            color: white;
            text-shadow: 2px 2px #000;
            cursor: pointer;
            box-shadow: 0 4px #b35900;
        }

        .menu-btn:active { transform: translateY(2px); box-shadow: 0 2px #b35900; }

        /* Bottom Play Button */
        .bottom-area {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 20px;
        }

        .play-btn {
            width: 250px;
            height: 70px;
            background: linear-gradient(#ffcb05, #ff9900);
            border: 4px solid #fff;
            border-radius: 15px;
            font-size: 32px;
            color: #fff;
            text-shadow: 3px 3px #000;
            cursor: pointer;
            box-shadow: 0 6px #b36b00;
            transition: 0.1s;
        }

        .play-btn:active { transform: translateY(4px); box-shadow: 0 2px #b36b00; }

        /* Floating Stars Effect */
        .tap-effect {
            position: absolute;
            color: var(--bs-yellow);
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 0.8s forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-100px); opacity: 0; }
        }

        #master-tag {
            background: #ff0000;
            color: white;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

<div class="game-wrapper" id="lobby">
    <div class="top-bar">
        <div class="user-info">
            <span id="rank-name">PLAYER</span>
            <div id="master-tag" style="margin-left: 10px;">MASTER</div>
        </div>
        <div class="resource-box">
            <div class="res-item" style="border-color: #ffcb05;">
                ⭐ <span id="stars-val">0</span>
            </div>
            <div class="res-item" style="border-color: #00e5ff;">
                💎 <span id="cwk-val">0</span>
            </div>
            <div class="res-item" style="border-color: #4cd964;">
                👑 <span id="prime-val">0</span>
            </div>
        </div>
    </div>

    <div class="side-menu">
        <button class="menu-btn" onclick="alert('Магазин скоро!')">SHOP</button>
        <button class="menu-btn" onclick="alert('Кейсы скоро!')">BOXES</button>
        <button class="menu-btn" style="background: #0072ce;" onclick="saveGame()">SAVE</button>
    </div>

    <div class="lobby-main" onclick="handleTap(event)">
        <div class="character-box">
            <img class="character-img" id="hero">
        </div>
    </div>

    <div class="bottom-area">
        <button class="play-btn" onclick="exchangeLogic()">EXCHANGE</button>
    </div>
</div>

<script>
    let stats = {
        stars: 25,
        cwk: 0,
        prime: 0,
        rank: "PLAYER"
    };

    // Audio effects simulation (Visual)
    function handleTap(e) {
        stats.stars += 0.2;
        updateUI();
        
        // Visual tap effect
        const effect = document.createElement('div');
        effect.className = 'tap-effect';
        effect.innerText = '+0.2 ⭐';
        effect.style.left = e.pageX + 'px';
        effect.style.top = e.pageY + 'px';
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 800);
    }

    function exchangeLogic() {
        if (stats.stars >= 275500) {
            stats.stars -= 275500;
            stats.cwk += 1;
            alert("Вы получили 1 CWK!");
        } else if (stats.cwk >= 3) {
            stats.cwk -= 3;
            stats.prime += 1;
            alert("Вы получили 1 PRIME!");
        } else {
            alert("Недостаточно ресурсов для обмена!");
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('stars-val').innerText = Math.floor(stats.stars).toLocaleString();
        document.getElementById('cwk-val').innerText = stats.cwk;
        document.getElementById('prime-val').innerText = stats.prime;
        
        if (stats.prime >= 3) {
            document.getElementById('master-tag').style.display = 'block';
            document.getElementById('rank-name').style.color = '#ffcb05';
        }
        localStorage.setItem('CukoStars_Brawl', JSON.stringify(stats));
    }

    function saveGame() {
        localStorage.setItem('CukoStars_Brawl', JSON.stringify(stats));
        alert("Прогресс сохранен!");
    }

    // Load
    const saved = localStorage.getItem('CukoStars_Brawl');
    if (saved) {
        stats = JSON.parse(saved);
        updateUI();
    }

    // Auto-update UI on start
    updateUI();
</script>

</body>
</html>
