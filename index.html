<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKS Cosmic Evolution</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0f 100%);
            color: white;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Sahifa sarlavhasi */
        .header {
            text-align: center;
            padding: 10px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        /* Balans paneli */
        .stats-card {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            background: linear-gradient(145deg, rgba(0,243,255,0.1), rgba(188,19,254,0.1));
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stat-item { text-align: center; }
        .stat-item div:first-child { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-item div:last-child { font-size: 20px; font-weight: bold; color: var(--neon-blue); }

        /* Tap Area */
        .tap-section {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #tap-object {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
            border: 4px solid var(--neon-blue);
        }

        #tap-object:active { transform: scale(0.9); box-shadow: 0 0 20px var(--neon-blue); }

        /* Magazin va Inventar */
        .section-title { font-size: 18px; margin-bottom: 10px; color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }
        
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .shop-item {
            background: var(--glass);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .shop-item:hover { border-color: var(--neon-blue); }
        .shop-item img { width: 50px; margin-bottom: 10px; }
        .shop-item .price { color: #ffcc00; font-weight: bold; font-size: 14px; margin-bottom: 10px; }

        .btn-buy {
            background: var(--neon-purple);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .btn-buy:disabled { background: #444; cursor: not-allowed; }

        /* Inventar */
        .inventory {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            min-height: 50px;
        }

        .inv-slot {
            width: 40px;
            height: 40px;
            background: var(--glass);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--neon-blue);
        }

        /* Animatsiya effektlari */
        @keyframes floatUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100px); opacity: 0; }
        }

        .floating {
            position: absolute;
            color: var(--neon-blue);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        #master-rank {
            display: none;
            color: #ff0055;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 5px #ff0055; }
            50% { text-shadow: 0 0 20px #ff0055; }
            100% { text-shadow: 0 0 5px #ff0055; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>CKS EVOLUTION</h2>
        <div id="master-rank">🏆 MASTER LEVEL 🏆</div>
    </div>

    <div class="stats-card">
        <div class="stat-item">
            <div>Stars</div>
            <div id="stars">0</div>
        </div>
        <div class="stat-item">
            <div>CWK</div>
            <div id="cwk">0</div>
        </div>
        <div class="stat-item">
            <div>Prime</div>
            <div id="prime">0</div>
        </div>
    </div>

    <div class="tap-section">
        <div id="tap-object">CKS</div>
    </div>

    <div class="section-title">Магазин CKS</div>
    <div class="shop-grid">
        <div class="shop-item">
            <div class="price">10 Stars</div>
            <div>Обычный Кейс</div>
            <button class="btn-buy" onclick="buyBox(10, '📦')">Купить</button>
        </div>
        <div class="shop-item">
            <div class="price">60 Stars</div>
            <div>Премиум Кейс</div>
            <button class="btn-buy" onclick="buyBox(60, '💎')">Купить</button>
        </div>
        <div class="shop-item">
            <div class="price">275,500 Stars</div>
            <div>1 CWK</div>
            <button class="btn-buy" onclick="buyCWK()">Обменять</button>
        </div>
        <div class="shop-item">
            <div class="price">3 CWK</div>
            <div>1 PRIME</div>
            <button class="btn-buy" onclick="buyPrime()">Улучшить</button>
        </div>
    </div>

    <div class="section-title">Ваш инвентарь</div>
    <div class="inventory" id="inventory">
        </div>

    <div class="section-title" style="font-size: 12px; color: #666;">Код аккаунта (Save/Load)</div>
    <input type="text" id="acc-code" style="width:100%; background: #000; color: #0f0; border: none; padding: 5px; font-size: 10px;">
    <button class="btn-buy" style="margin-top:5px; background: #333;" onclick="importAcc()">Загрузить по коду</button>
</div>

<script>
    // Asosiy ma'lumotlar ob'ekti
    let game = {
        stars: 25,
        cwk: 0,
        prime: 0,
        items: []
    };

    // SAVE - Brauzerga saqlash
    function saveGame() {
        localStorage.setItem('CKS_SAVED_DATA', JSON.stringify(game));
        document.getElementById('acc-code').value = btoa(JSON.stringify(game)); // Export code
    }

    // LOAD - Brauzerdan o'qish
    function loadGame() {
        const saved = localStorage.getItem('CKS_SAVED_DATA');
        if (saved) {
            try {
                game = JSON.parse(saved);
                renderAll();
            } catch (e) {
                console.log("Xato yuklashda!");
            }
        }
    }

    function renderAll() {
        document.getElementById('stars').innerText = Math.floor(game.stars).toLocaleString();
        document.getElementById('cwk').innerText = game.cwk;
        document.getElementById('prime').innerText = game.prime;
        
        // Master daraja tekshiruvi
        if (game.prime >= 3) {
            document.getElementById('master-rank').style.display = 'block';
        }

        // Inventarni yangilash
        const inv = document.getElementById('inventory');
        inv.innerHTML = '';
        game.items.forEach(emoji => {
            const slot = document.createElement('div');
            slot.className = 'inv-slot';
            slot.innerText = emoji;
            inv.appendChild(slot);
        });
    }

    // TAP funksiyasi
    document.getElementById('tap-object').addEventListener('click', function(e) {
        game.stars += 0.2;
        
        // Animatsiya (+0.2 yozuvi)
        const f = document.createElement('div');
        f.className = 'floating';
        f.innerText = '+0.2';
        f.style.left = e.pageX + 'px';
        f.style.top = e.pageY + 'px';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 600);

        renderAll();
        saveGame();
    });

    // DO'KON: Keys sotib olish
    function buyBox(cost, emoji) {
        if (game.stars >= cost) {
            game.stars -= cost;
            game.items.push(emoji); // Inventarga qo'shish
            alert("Вы открыли кейс и получили " + emoji);
            renderAll();
            saveGame();
        } else {
            alert("Недостаточно Stars!");
        }
    }

    // DO'KON: CWK
    function buyCWK() {
        if (game.stars >= 275500) {
            game.stars -= 275500;
            game.cwk += 1;
            renderAll();
            saveGame();
        } else {
            alert("Недостаточно Stars!");
        }
    }

    // DO'KON: PRIME
    function buyPrime() {
        if (game.cwk >= 3) {
            game.cwk -= 3;
            game.prime += 1;
            renderAll();
            saveGame();
        } else {
            alert("Нужно 3 CWK!");
        }
    }

    // Akkauntni import qilish
    function importAcc() {
        const code = document.getElementById('acc-code').value;
        try {
            const decoded = JSON.parse(atob(code));
            game = decoded;
            renderAll();
            saveGame();
            alert("Аккаунт загружен!");
        } catch(e) {
            alert("Ошибка кода!");
        }
    }

    // O'yin boshlanganda yuklash
    loadGame();
</script>

</body>
</html>
