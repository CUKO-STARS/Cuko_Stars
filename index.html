<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuko Stars v1.5 - Premium Update</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Exo+2:wght@300;700&display=swap');

        :root {
            --accent: #fbbf24;
            --blue: #3b82f6;
            --bg-dark: #05070a;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Exo 2', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Анимированный фон */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 50%),
                        radial-gradient(circle at 50% 120%, #450a0a 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--border-glass);
            border-right: 1px solid var(--border-glass);
        }

        /* Статистика с неоном */
        .header-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 12px 5px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--accent); margin-top: 5px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        /* Игровое поле */
        .game-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #master-status {
            display: none;
            background: linear-gradient(90deg, #ef4444, #f59e0b);
            padding: 6px 20px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 900;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.8; } }

        .character-portal {
            position: relative;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .character-portal:active { transform: scale(0.92); }

        .character-main {
            width: 220px;
            height: 220px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.5));
            /* Твоя картинка */
            content: url('https://cdn-icons-png.flaticon.com/512/11545/11545598.png');
        }

        /* Навигация */
        .bottom-nav {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            margin-bottom: 10px;
        }

        .nav-link {
            flex: 1;
            background: none;
            border: none;
            color: #64748b;
            font-weight: 700;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        .nav-link.active { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }

        /* Магазин v1.5 */
        .shop-container {
            display: none;
            overflow-y: auto;
            max-height: 50vh;
            padding-right: 5px;
        }

        .shop-container.active { display: block; }

        .item-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            transition: 0.2s;
        }

        .btn-action:hover { filter: brightness(1.1); transform: scale(1.05); }

        /* Промокод v1.5 */
        .promo-section {
            background: rgba(251, 191, 36, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px dashed var(--accent);
            text-align: center;
        }

        .promo-field {
            width: 100%;
            background: #000;
            border: 1px solid #334155;
            color: var(--accent);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 12px;
            font-family: 'Orbitron', sans-serif;
            box-sizing: border-box;
        }

        /* Эффект клика */
        .click-particle {
            position: absolute;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            pointer-events: none;
            animation: riseFade 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes riseFade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <div class="header-stats">
        <div class="stat-card">
            <div class="stat-label">Звезды</div>
            <div id="stars-val" class="stat-value">25</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">CWK</div>
            <div id="cwk-val" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">PRIME</div>
            <div id="prime-val" class="stat-value">0</div>
        </div>
    </div>

    <div class="game-view" id="view-game">
        <div id="master-status">MASTER RANK</div>
        <div class="character-portal" onclick="doTap(event)">
            <img class="character-main" alt="Cuko Character">
        </div>
        <p style="color: #475569; font-size: 14px; margin-top: 30px; letter-spacing: 1px;">ТАПАЙ, ЧТОБЫ МАЙНИТЬ +0.5 ⭐</p>
    </div>

    <div class="shop-container" id="view-shop">
        <div class="item-card">
            <div><b style="font-size: 16px;">Бронзовый кейс</b><br><small style="color: #64748b;">Шанс на удачу | Цена: 10 ⭐</small></div>
            <button class="btn-action" onclick="openBox(10)">Открыть</button>
        </div>
        
        <div class="item-card" style="border-color: var(--blue);">
            <div><b style="font-size: 16px; color: var(--blue);">Обмен на CWK</b><br><small style="color: #64748b;">275,500 ⭐ за 1 ед.</small></div>
            <button class="btn-action" style="background: var(--blue); color: white;" onclick="buyCWK()">Обмен</button>
        </div>

        <div class="item-card" style="border-color: #10b981;">
            <div><b style="font-size: 16px; color: #10b981;">Апгрейд PRIME</b><br><small style="color: #64748b;">Требуется: 1 CWK</small></div>
            <button class="btn-action" style="background: #10b981; color: white;" onclick="buyPrime()">Купить</button>
        </div>

        <div class="promo-section">
            <div style="font-size: 12px; margin-bottom: 10px; color: var(--accent); font-weight: 700;">АКТИВАЦИЯ ПРОМОКОДА</div>
            <input type="text" id="promo-input" class="promo-field" placeholder="KODE...">
            <button class="btn-action" style="width: 100%;" onclick="usePromo()">Подтвердить</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-link active" id="nav-game" onclick="switchTab('game', this)">ГЛАВНАЯ</button>
        <button class="nav-link" id="nav-shop" onclick="switchTab('shop', this)">МАГАЗИН</button>
        <button class="nav-link" style="color: var(--accent);" onclick="saveGame(true)">SAVE</button>
    </div>
</div>

<script>
    let gameState = {
        stars: 25,
        cwk: 0,
        prime: 0
    };

    // Пул промокодов
    function usePromo() {
        const code = document.getElementById('promo-input').value.trim();
        if (code === 'khiva90') {
            gameState.stars = 999999999;
            gameState.cwk = 999999999;
            gameState.prime = 999999999;
            alert("ADMIN: Ранг Бога активирован!");
            updateUI();
        } else if (code === 'cukoo26') {
            gameState.stars += 175000;
            alert("Бонус: +175,000 ⭐");
            updateUI();
        } else {
            alert("Ошибка: Недействительный код");
        }
        document.getElementById('promo-input').value = "";
    }

    function doTap(e) {
        gameState.stars += 0.5;
        
        // Частица при клике
        const p = document.createElement('div');
        p.className = 'click-particle';
        p.innerText = '+0.5';
        p.style.left = e.pageX + 'px';
        p.style.top = e.pageY + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        updateUI();
    }

    function updateUI() {
        document.getElementById('stars-val').innerText = Math.floor(gameState.stars).toLocaleString();
        document.getElementById('cwk-val').innerText = Math.floor(gameState.cwk).toLocaleString();
        document.getElementById('prime-val').innerText = Math.floor(gameState.prime).toLocaleString();
        
        if (gameState.prime >= 3) {
            document.getElementById('master-status').style.display = 'block';
        } else {
            document.getElementById('master-status').style.display = 'none';
        }
        saveGame(false);
    }

    function switchTab(tab, btn) {
        document.getElementById('view-game').style.display = (tab === 'game') ? 'flex' : 'none';
        document.getElementById('view-shop').classList.toggle('active', tab === 'shop');
        
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
    }

    function openBox(cost) {
        if (gameState.stars >= cost) {
            gameState.stars -= cost;
            const win = Math.floor(Math.random() * (cost * 3));
            gameState.stars += win;
            alert(`Результат открытия: ${win} ⭐`);
            updateUI();
        } else { alert("Недостаточно звезд!"); }
    }

    function buyCWK() {
        if (gameState.stars >= 275500) {
            gameState.stars -= 275500;
            gameState.cwk += 1;
            updateUI();
        } else { alert("Недостаточно звезд!"); }
    }

    function buyPrime() {
        if (gameState.cwk >= 1) {
            gameState.cwk -= 1;
            gameState.prime += 1;
            updateUI();
        } else { alert("Нужен 1 CWK!"); }
    }

    function saveGame(manual) {
        localStorage.setItem('CukoStars_V1_5', JSON.stringify(gameState));
        if(manual) alert("Прогресс в облаке!");
    }

    function loadGame() {
        const data = localStorage.getItem('CukoStars_V1_5');
        if (data) {
            gameState = JSON.parse(data);
            updateUI();
        }
    }

    loadGame();
</script>
</body>
</html>
