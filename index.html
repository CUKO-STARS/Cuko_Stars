<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuko Stars - Official Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0b0e14;
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(180deg, #141a26 0%, #0b0e14 100%);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            border: 2px solid #1f2937;
        }

        /* Stats Panel */
        .stats-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 3px solid #374151;
        }

        .stat-box div:first-child { font-size: 10px; color: #9ca3af; text-transform: uppercase; }
        .stat-box div:last-child { font-size: 18px; font-weight: 900; color: #fbbf24; }

        /* Character/Tap Zone */
        .main-game {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #master-status {
            display: none;
            background: #ef4444;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .character-circle {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
        }

        .character-circle:active { transform: scale(0.95); }

        .character-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        /* Menu Tabs */
        .menu-bar {
            display: flex;
            justify-content: space-around;
            background: #1f2937;
            padding: 10px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #9ca3af;
            font-weight: bold;
            cursor: pointer;
            padding: 10px;
        }

        .menu-btn.active { color: #fbbf24; border-bottom: 2px solid #fbbf24; }

        /* Sections */
        .content-section { display: none; margin-top: 20px; }
        .content-section.active { display: block; }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-buy {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Promo Section */
        .promo-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed #4b5563;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }

        .promo-input {
            width: 80%;
            background: #0b0e14;
            border: 1px solid #374151;
            color: #fbbf24;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-family: 'Montserrat';
            margin-bottom: 10px;
        }

        /* Floating Animation */
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .tap-anim {
            position: absolute;
            color: #fbbf24;
            font-weight: 900;
            pointer-events: none;
            animation: floatUp 0.6s forwards;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-header">
        <div class="stat-box"><div>Stars</div><div id="stars">25</div></div>
        <div class="stat-box"><div>CWK</div><div id="cwk">0</div></div>
        <div class="stat-box"><div>Prime</div><div id="prime">0</div></div>
    </div>

    <div class="main-game" id="section-tap">
        <div id="master-status">MASTER RANK</div>
        <div class="character-circle" onclick="handleTap(event)">
            <img class="character-img" src="https://cdn-icons-png.flaticon.com/512/1041/1041888.png" id="hero-img" alt="Cuko">
        </div>
        <p style="color: #6b7280; margin-top: 20px;">Tap to Earn +0.5 ⭐</p>
    </div>

    <div class="content-section" id="section-shop">
        <div class="shop-item">
            <div><b>Bronze Box</b><br><small>Цена: 10 Stars</small></div>
            <button class="btn-buy" onclick="openBox(10)">Открыть</button>
        </div>
        <div class="stat-box" style="margin: 20px 0;">
            <p style="font-size: 12px;">Обмен: 275,500 Stars = 1 CWK</p>
            <button class="btn-buy" style="width: 100%;" onclick="buyCWK()">Обменять Stars</button>
        </div>
        <div class="stat-box">
            <p style="font-size: 12px;">Обмен: 1 CWK = 1 PRIME</p>
            <button class="btn-buy" style="width: 100%; background: #10b981; color: white;" onclick="buyPrime()">Купить Prime</button>
        </div>

        <div class="promo-box">
            <input type="text" id="promo-input" class="promo-input" placeholder="Введите промокод">
            <button class="btn-buy" style="width: 85%; background: #6366f1; color: white;" onclick="usePromo()">Активировать</button>
        </div>
    </div>

    <div class="menu-bar">
        <button class="menu-btn active" id="btn-game" onclick="showSection('tap', this)">GAME</button>
        <button class="menu-btn" id="btn-shop" onclick="showSection('shop', this)">SHOP / BOX</button>
        <button class="menu-btn" onclick="saveGame()">SAVE</button>
    </div>
</div>

<script>
    let data = {
        stars: 25,
        cwk: 0,
        prime: 0,
        rank: "Player"
    };

    // PROMO LOGIKASI
    function usePromo() {
        const input = document.getElementById('promo-input').value.trim();
        if (input === 'khiva90') {
            data.stars = 999999999;
            data.cwk = 999999999;
            data.prime = 999999999;
            alert("ADMIN: OK!");
            updateUI();
        } else if (input === 'cukoo26') {
            data.stars += 175000;
            alert("175,000 Stars OK!");
            updateUI();
        } else {
            alert("Xato kod!");
        }
        document.getElementById('promo-input').value = "";
    }

    function updateUI() {
        document.getElementById('stars').innerText = Math.floor(data.stars).toLocaleString();
        document.getElementById('cwk').innerText = Math.floor(data.cwk).toLocaleString();
        document.getElementById('prime').innerText = Math.floor(data.prime).toLocaleString();
        
        if (data.prime >= 3) {
            document.getElementById('master-status').style.display = 'block';
        }
        saveGame();
    }

    function handleTap(e) {
        data.stars += 0.5;
        const float = document.createElement('div');
        float.className = 'tap-anim';
        float.innerText = '+0.5';
        float.style.left = e.pageX + 'px';
        float.style.top = e.pageY + 'px';
        document.body.appendChild(float);
        setTimeout(() => float.remove(), 600);
        updateUI();
    }

    function showSection(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-tap').style.display = (id === 'tap') ? 'flex' : 'none';
        if(id === 'shop') document.getElementById('section-shop').classList.add('active');
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openBox(cost) {
        if (data.stars >= cost) {
            data.stars -= cost;
            const win = Math.floor(Math.random() * (cost * 3));
            data.stars += win;
            alert(`Sizga ${win} Stars tushdi!`);
            updateUI();
        }
    }

    function buyCWK() {
        if (data.stars >= 275500) {
            data.stars -= 275500;
            data.cwk += 1;
            updateUI();
        }
    }

    function buyPrime() {
        if (data.cwk >= 1) {
            data.cwk -= 1;
            data.prime += 1;
            updateUI();
        }
    }

    function saveGame() {
        localStorage.setItem('CukoStars_Final_Final', JSON.stringify(data));
    }

    function loadGame() {
        const saved = localStorage.getItem('CukoStars_Final_Final');
        if (saved) {
            data = JSON.parse(saved);
            updateUI();
        }
    }

    loadGame();
</script>
</body>
</html>
